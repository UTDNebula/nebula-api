# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "graphql-v2" ]
  pull_request:
    branches: [ "graphql-v2" ]
  workflow_dispatch:

jobs:

  build_ubuntu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./graphql
    steps:
    
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: "**/go.sum"

    - name: Setup
      run: make setup

    - name: Check
      run: make check

    - name: Build
      run: make build

  build_windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .\graphql
    steps:
    
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        cache-dependency-path: "**\\go.sum"

    - name: Setup
      run: .\build.bat setup

    - name: Check
      run: .\build.bat checks

    - name: Build
      run: .\build.bat build
